<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>בא"ח בכף היד</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="sources/images/baah icon.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
</head>

<body>
  <header>
    <img src="sources/images/baah icon.png" alt="baah-icon" class="baah-icon">
    <p class="baah-title">בא"ח חיר"ג בכף היד |</p>
  </header>
  <div id="chat">
  </div>
  <div id="inputBox">
    <button onclick="document.getElementById('fileUpload').click()">+</button>
    <input id="input" placeholder="כתוב הודעה..." style="flex: 1;" />
    <input type="file" id="fileUpload" accept=".xlsx,.xls" style="display: none;" />
    <button onclick="send()">שלח</button>
  </div>

  <script>
    // המערך מתחיל ריק לחלוטין. השרת יוסיף את הפרומפט של חי"ר גבולות בעצמו לפני השליחה לגוגל!
    let messages = []; 
    
    async function send() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;
    
      addMessage(text, "user");
      messages.push({ role: "user", content: text });
      input.value = "";
    
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages })
        });
    
        if (!res.ok) throw new Error("שגיאה");
    
        const data = await res.json();
        const reply = data.reply || "שגיאה בתשובה";
    
        messages.push({ role: "model", content: reply });
        addMessage(reply, "bot");
      } catch (e) {
        console.error(e);
        addMessage("שגיאה בחיבור – נסה שוב", "bot");
      }
    }
    
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;
    
      document.getElementById("chat").appendChild(div);
      document.getElementById("chat").scrollTop = 999999;
    }
    
    document.getElementById("input").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        send();
      }
    });
    
    // העלאת קובץ
    document.getElementById('fileUpload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
    
      addMessage(`מעלה קובץ: ${file.name}...`, "user");
    
      const formData = new FormData();
      formData.append('file', file);
    
      try {
        const res = await fetch("/api/upload", {
          method: "POST",
          body: formData
        });
    
        const data = await res.json();
        addMessage(data.reply, "bot");
      } catch (err) {
        addMessage("שגיאה בהעלאה", "bot");
      }
    });
    </script>

</body>
</html>
